{% set name = "python-installer" %}
{% set pypi_name = "installer" %}
{% set version = "0.6.0" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ pypi_name[0] }}/{{ pypi_name }}/{{ pypi_name }}-{{ version }}.tar.gz
  sha256: f3bd36cd261b440a88a1190b1becca0578fee90b4b62decc796932fdd5ae8839

build:
  number: 0
  skip: true  # [py<37]
  script: {{ PYTHON }} -m pip install --no-deps --no-build-isolation . -vv

requirements:
  host:
    - pip
    - python
    - flit-core >=3.2.0,<4
  run:
    - python

test:
  source_files:
    - tests
  imports:
    - installer
  requires:
    - pip
    - pytest
  commands:
    - pip check
    - pytest -v tests

about:
  home: https://github.com/pypa/installer
  description: |
    This is a low-level library for installing a Python package from a wheel distribution.
    It provides basic functionality and abstractions for handling wheels and installing packages from wheels.
  summary: A library for installing Python wheels.
  license: MIT
  license_file: LICENSE
  license_family: MIT
  dev_url: https://installer.pypa.io
  doc_url: https://github.com/pypa/installer/tree/main/docs

extra:
  recipe-maintainers:
    - xhochy
